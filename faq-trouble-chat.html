    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', sans-serif;
      color: #1a1a1a; background: #f4f5f7; font-size: 15px; line-height: 1.6;
    }

    /* ─── HEADER ─── */
    header { background: #cc1933; }
    .header-inner {
      max-width: 1200px; margin: 0 auto; padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between; height: 64px;
    }
    .logo { display: flex; align-items: center; text-decoration: none; }
    .logo img { height: 36px; width: auto; filter: brightness(0) invert(1); }
    nav { display: flex; align-items: center; gap: 32px; }
    nav a {
      text-decoration: none; color: rgba(255,255,255,0.85); font-size: 14px; font-weight: 500;
      padding: 4px 0; border-bottom: 2px solid transparent; transition: all 0.2s;
    }
    nav a:hover, nav a.active { color: #fff; border-bottom-color: #fff; }
    .header-contact {
      background: #fff !important; color: #cc1933 !important; padding: 8px 20px !important;
      border-bottom: none !important; font-size: 13px !important; font-weight: 700 !important; border-radius: 3px;
    }

    /* ─── BREADCRUMB ─── */
    .breadcrumb { background: #f0f0f0; border-bottom: 1px solid #e8e8e8; }
    .breadcrumb-inner {
      max-width: 1200px; margin: 0 auto; padding: 9px 24px;
      display: flex; align-items: center; gap: 8px; font-size: 12px; color: #666;
    }
    .breadcrumb a { color: #666; text-decoration: none; }
    .breadcrumb a:hover { color: #cc1933; }
    .breadcrumb-sep { color: #bbb; }

    /* ─── SEARCH HERO ─── */
    .search-hero {
      background: linear-gradient(135deg, #1a2640 0%, #2d3f5e 100%);
      padding: 48px 24px 40px; text-align: center;
      transition: padding 0.3s;
    }
    .search-hero.compact { padding: 24px 24px 28px; }
    .hero-title-wrap {
      display: flex; align-items: center; justify-content: center;
      gap: 14px; margin-bottom: 8px;
      transition: all 0.3s;
    }
    .search-hero.compact .hero-title-wrap { margin-bottom: 6px; }
    .hero-ai-badge {
      width: 46px; height: 46px; flex-shrink: 0;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.3s;
    }
    .search-hero.compact .hero-ai-badge { width: 34px; height: 34px; border-radius: 8px; }
    .search-hero.compact .hero-ai-badge svg { width: 18px; height: 18px; }
    .search-hero h1 { color: #fff; font-size: 26px; font-weight: 700; transition: font-size 0.3s; }
    .search-hero.compact h1 { font-size: 20px; }
    .hero-sub { color: rgba(255,255,255,0.65); font-size: 14px; margin-top: 8px; margin-bottom: 24px; transition: all 0.3s; }
    .search-hero.compact .hero-sub { display: none; }

    .search-box-wrap { max-width: 620px; margin: 0 auto; position: relative; }
    .search-input {
      width: 100%; padding: 16px 52px 16px 52px;
      font-size: 16px; border: none; border-radius: 12px; outline: none;
      box-shadow: 0 4px 28px rgba(0,0,0,0.25); font-family: inherit; color: #1a1a1a;
      transition: box-shadow 0.2s;
    }
    .search-input:focus { box-shadow: 0 4px 28px rgba(0,0,0,0.3), 0 0 0 3px rgba(204,25,51,0.35); }
    .search-input::placeholder { color: #bbb; }
    .search-icon-wrap {
      position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
      pointer-events: none; color: #bbb;
    }
    .search-btn {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      background: #cc1933; border: none; border-radius: 8px; width: 40px; height: 36px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .search-btn:hover { background: #a8142a; }

    /* ─── POPULAR TAGS ─── */
    .popular-tags {
      max-width: 620px; margin: 16px auto 0; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
      transition: all 0.3s;
    }
    .search-hero.compact .popular-tags { display: none; }
    .pop-tag {
      background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.25);
      color: rgba(255,255,255,0.85); border-radius: 20px; padding: 5px 14px;
      font-size: 12px; cursor: pointer; transition: all 0.18s; font-family: inherit;
    }
    .pop-tag:hover { background: rgba(255,255,255,0.22); color: #fff; }

    /* ─── THREAD ─── */
    .thread { max-width: 720px; margin: 0 auto; padding: 32px 24px 80px; display: flex; flex-direction: column; gap: 0; }

    /* ─── ANSWER BLOCK ─── */
    .answer-block { margin-bottom: 8px; animation: fadeUp 0.35s ease; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

    .query-label {
      font-size: 12px; color: #999; font-weight: 500; letter-spacing: 0.04em;
      margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
    }
    .query-label::before { content:''; display:block; width:16px; height:1px; background:#ccc; }
    .query-label span { color: #555; font-weight: 700; }

    .answer-card {
      background: #fff; border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07); overflow: hidden;
    }
    .answer-card-q {
      padding: 18px 24px 14px; border-bottom: 1px solid #f0f0f0;
      display: flex; align-items: flex-start; gap: 10px;
    }
    .q-mark { color: #cc1933; font-weight: 900; font-size: 18px; flex-shrink: 0; line-height: 1.4; }
    .q-text { font-size: 15px; font-weight: 700; color: #1a1a1a; line-height: 1.5; }
    .answer-card-a { padding: 18px 24px; }
    .answer-card-a p { font-size: 13px; line-height: 1.85; color: #444; }
    .answer-card-a p + p { margin-top: 8px; }
    .answer-card-a ol, .answer-card-a ul { padding-left: 20px; font-size: 13px; line-height: 1.85; color: #444; }
    .answer-card-a li { margin-bottom: 5px; }
    .a-note {
      margin-top: 14px; padding: 10px 14px;
      background: #fff0f2; border-left: 3px solid #cc1933;
      border-radius: 0 6px 6px 0; font-size: 12px; color: #666;
    }

    /* ─── RESOLUTION ─── */
    .resolution {
      padding: 18px 24px; border-top: 1px solid #f0f0f0;
      background: #fafafa;
    }
    .resolution p { font-size: 13px; color: #666; margin-bottom: 12px; }
    .resolution-btns { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn-resolved {
      display: flex; align-items: center; gap: 6px;
      padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 700;
      cursor: pointer; border: none; font-family: inherit; transition: all 0.2s;
    }
    .btn-yes { background: #cc1933; color: #fff; }
    .btn-yes:hover { background: #a8142a; }
    .btn-no { background: #fff; color: #555; border: 1.5px solid #ddd; }
    .btn-no:hover { border-color: #cc1933; color: #cc1933; }
    .btn-resolved:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ─── RESOLVED MESSAGE ─── */
    .resolved-msg {
      background: #f0faf4; border: 1.5px solid #a8d8b8; border-radius: 10px;
      padding: 18px 22px; display: flex; align-items: center; gap: 12px;
      animation: fadeUp 0.3s ease; margin-top: 12px;
    }
    .resolved-msg-icon { font-size: 24px; flex-shrink: 0; }
    .resolved-msg p { font-size: 14px; color: #2a7a4a; font-weight: 600; }
    .resolved-msg small { font-size: 12px; color: #5a9a6a; font-weight: 400; }

    /* ─── NO MATCH ─── */
    .no-match {
      background: #fff; border-radius: 12px; padding: 32px 24px; text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07); animation: fadeUp 0.35s ease;
    }
    .no-match-icon { font-size: 36px; margin-bottom: 12px; }
    .no-match p { font-size: 14px; color: #666; line-height: 1.7; }

    /* ─── FOLLOW-UP SEARCH ─── */
    .followup-wrap {
      margin-top: 16px; padding: 22px 24px;
      background: #fff; border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      animation: fadeUp 0.35s ease;
    }
    .followup-wrap p { font-size: 13px; color: #888; margin-bottom: 12px; }
    .followup-input-row { display: flex; gap: 10px; }
    .followup-input {
      flex: 1; border: 1.5px solid #ddd; border-radius: 8px; padding: 11px 15px;
      font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.2s;
    }
    .followup-input:focus { border-color: #cc1933; }
    .followup-input::placeholder { color: #bbb; }
    .followup-btn {
      background: #cc1933; color: #fff; border: none; border-radius: 8px;
      padding: 0 20px; font-size: 13px; font-weight: 700; cursor: pointer;
      font-family: inherit; transition: background 0.2s; white-space: nowrap;
    }
    .followup-btn:hover { background: #a8142a; }

    /* ─── DIVIDER ─── */
    .thread-divider {
      display: flex; align-items: center; gap: 12px; margin: 20px 0;
      color: #bbb; font-size: 12px;
    }
    .thread-divider::before, .thread-divider::after {
      content: ''; flex: 1; height: 1px; background: #e8e8e8;
    }
  </style>
</head>

<script>
const FAQS = [
  {
    id: 1, cat: '映像', popular: true,
    q: '映像が映らない・画面が真っ暗になる',
    kw: ['映像', '映らない', '真っ暗', 'video', '表示されない', '画面', 'ブラック', '映像が出ない'],
    a: `<p>以下の手順をお試しください。</p>
        <ol>
          <li>カメラの電源を一度オフにし、10秒後に再起動してください。</li>
          <li>レンズカバーが開いているか確認してください。</li>
          <li>バッテリー残量を確認し、十分に充電されているかご確認ください。</li>
          <li>接続しているモニターやアプリを再起動してください。</li>
          <li>別の接続ケーブル・ポートで試してください。</li>
        </ol>
        <div class="a-note">上記で解消しない場合は、センサーや内部基板の故障の可能性があります。Xactiサポートへお問い合わせください。</div>`
  },
  {
    id: 2, cat: '映像', popular: false,
    q: '映像にノイズや乱れが出る',
    kw: ['ノイズ', '乱れ', 'ざらつき', '砂嵐', '縦線', '横線', 'ちらつき', '映像'],
    a: `<p>映像の乱れはケーブル接触不良や照明環境が原因となることが多いです。</p>
        <ol>
          <li>接続ケーブルの差し込みを確認し、抜き差ししてください。</li>
          <li>照明が強すぎる・逆光になっていないか確認してください。</li>
          <li>近くに強い電磁波を発する機器がないか確認してください。</li>
          <li>カメラとモニター／アプリを再起動してください。</li>
          <li>ファームウェアを最新バージョンに更新してください。</li>
        </ol>`
  },
  {
    id: 3, cat: '映像', popular: false,
    q: '映像がフリーズ・静止する',
    kw: ['フリーズ', '止まる', '静止', '固まる', '動かない', '映像'],
    a: `<p>フリーズは処理負荷・ネットワーク帯域・メモリ不足が主な原因です。</p>
        <ol>
          <li>カメラ・視聴アプリを再起動してください。</li>
          <li>Wi-Fiの電波強度を確認してください。</li>
          <li>映像解像度・フレームレートの設定を下げてみてください。</li>
        </ol>`
  },
  {
    id: 4, cat: '映像', popular: false,
    q: '映像が暗い・色がおかしい',
    kw: ['暗い', '明るさ', '色', '色合い', 'ホワイトバランス', '露出'],
    a: `<p>露出・ホワイトバランスの設定で改善できる場合がほとんどです。</p>
        <ol>
          <li>アプリまたはウェブ設定画面から「明るさ（露出）」を調整してください。</li>
          <li>「ホワイトバランス」を撮影環境に合わせて変更してください。</li>
          <li>レンズ面が汚れていないか確認し、柔らかい布で拭いてください。</li>
        </ol>`
  },
  {
    id: 5, cat: '接続', popular: true,
    q: 'Wi-Fiに接続できない・繋がらない',
    kw: ['wifi', 'wi-fi', '無線', '接続', '繋がらない', 'ネットワーク', 'ssid'],
    a: `<p>Wi-Fi接続の問題は以下の順序で確認してください。</p>
        <ol>
          <li>カメラを一度電源オフにして再起動してください。</li>
          <li>スマートフォン側のWi-FiをオフにしてからONにしてください。</li>
          <li>SSIDとパスワードが正しく入力されているか確認してください。</li>
          <li>ルーターの2.4GHz帯に接続しているかご確認ください（5GHz非対応機種あり）。</li>
          <li>ルーターを再起動してください。</li>
        </ol>
        <div class="a-note">セキュリティ設定が「WPA3のみ」のルーターでは接続できない場合があります。「WPA2/WPA3混在」モードに変更してください。</div>`
  },
  {
    id: 6, cat: '接続', popular: false,
    q: 'アプリがカメラを認識しない・接続できない',
    kw: ['アプリ', '認識', 'スマホ', 'ペアリング', 'bluetooth'],
    a: `<p>アプリとカメラのペアリングが切れている場合があります。</p>
        <ol>
          <li>スマートフォンのアプリを完全終了してから再起動してください。</li>
          <li>BluetoothとWi-Fiを一度オフにしてからONにしてください。</li>
          <li>アプリの「デバイス設定」からカメラを削除し、再ペアリングしてください。</li>
          <li>アプリが最新バージョンかご確認ください。</li>
        </ol>`
  },
  {
    id: 7, cat: '接続', popular: false,
    q: '接続が途中で切れる・不安定',
    kw: ['切れる', '途切れる', '不安定', '頻繁', '再接続'],
    a: `<p>接続が途切れる場合、電波環境または干渉が主な原因です。</p>
        <ol>
          <li>カメラとルーターの距離を縮めてください。</li>
          <li>カメラとルーターの間に障害物がないか確認してください。</li>
          <li>近くに他のWi-Fiルーターや電子レンジがある場合、別チャンネルに変更してください。</li>
        </ol>`
  },
  {
    id: 8, cat: '接続', popular: false,
    q: 'PCからカメラが認識されない（USB接続）',
    kw: ['pc', 'usb', 'windows', 'mac', 'パソコン', 'ドライバ', '認識されない'],
    a: `<p>USB接続で認識されない場合の確認手順です。</p>
        <ol>
          <li>USBケーブルを別のポート・ケーブルで試してください。</li>
          <li>カメラ側の接続モードが「ストレージ」または「UVC」になっているか確認してください。</li>
          <li>Xactiサポートサイトから最新のUSBドライバをインストールしてください。</li>
        </ol>`
  },
  {
    id: 9, cat: '録画', popular: true,
    q: 'SDカードが認識されない・エラーになる',
    kw: ['sdカード', 'sd', 'microsd', 'カード', 'フォーマット', '録画'],
    a: `<p>SDカードの互換性・フォーマットが原因のことが多いです。</p>
        <ol>
          <li>SDカードを一度取り出してから再挿入してください。</li>
          <li>Class 10 / UHS-I 以上のSDカードを使用しているか確認してください。</li>
          <li>カメラ本体の設定メニューからSDカードを「フォーマット」してください（データは消去されます）。</li>
          <li>別のSDカードで動作するか確認してください。</li>
        </ol>`
  },
  {
    id: 10, cat: '録画', popular: false,
    q: '録画が途中で止まる・自動停止する',
    kw: ['録画', '止まる', '停止', '途中', '自動', 'recording'],
    a: `<p>録画の自動停止はストレージ容量・温度・設定が原因の場合があります。</p>

        </ol>`

    id: 11, cat: '録画', popular: false,

function normalize(str) {
  return str.toLowerCase()
    .replace(/[ァ-ン]/g, s => String.fromCharCode(s.charCodeAt(0) - 0x60))
    .replace(/　/g, ' ');
}

function findBestMatch(query) {
  const q = normalize(query.trim());
  if (!q) return null;
  const tokens = q.split(/\s+/).filter(Boolean);
  let best = null, bestScore = 0;
  for (const faq of FAQS) {
    const target = normalize([faq.q, ...faq.kw].join(' '));
    const score = tokens.filter(t => target.includes(t)).length;
    if (score > bestScore) { bestScore = score; best = faq; }
  }
  return bestScore > 0 ? best : null;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let searchCount = 0;

function doSearch(query) {
  query = query.trim();
  if (!query) return;

  // Compact hero on first search
  if (searchCount === 0) {
    document.getElementById('searchHero').classList.add('compact');
  }
  searchCount++;

  const thread = document.getElementById('thread');

  // Add divider if not first
  if (searchCount > 1) {
    const div = document.createElement('div');
    div.className = 'thread-divider';
    div.textContent = '再検索';
    thread.appendChild(div);
  }

  const faq = findBestMatch(query);
  const blockId = 'block-' + searchCount;

  const block = document.createElement('div');
  block.className = 'answer-block';
  block.id = blockId;

  if (faq) {
    block.innerHTML = `
      <div class="query-label">「<span>${escHtml(query)}</span>」の検索結果</div>
      <div class="answer-card">
        <div class="answer-card-q">
          <span class="q-mark">Q</span>
          <span class="q-text">${escHtml(faq.q)}</span>
        </div>
        <div class="answer-card-a">${faq.a}</div>
        <div class="resolution" id="res-${blockId}">
          <p>この回答で解決しましたか？</p>
          <div class="resolution-btns">
            <button class="btn-resolved btn-yes" onclick="onResolved('${blockId}')">✅ 解決した</button>
            <button class="btn-resolved btn-no" onclick="onNotResolved('${blockId}')">❓ まだ解決しない</button>
          </div>
        </div>
      </div>`;
  } else {
    block.innerHTML = `
      <div class="query-label">「<span>${escHtml(query)}</span>」の検索結果</div>
      <div class="no-match">
        <div class="no-match-icon">🔍</div>
        <p>「${escHtml(query)}」に一致する回答が見つかりませんでした。<br>
        別のキーワードでお試しいただくか、Xactiサポートへお問い合わせください。</p>
      </div>
      <div class="followup-wrap" style="margin-top:12px;">
        <p>別のキーワードで検索する</p>
        <div class="followup-input-row">
          <input class="followup-input" type="text" placeholder="症状を入力…" autocomplete="off"
            onkeydown="if(event.key==='Enter') doSearch(this.value)">
          <button class="followup-btn" onclick="doSearch(this.previousElementSibling.value)">検索</button>
        </div>
      </div>`;
  }

  thread.appendChild(block);
  setTimeout(() => block.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
}

function onResolved(blockId) {
  const res = document.getElementById('res-' + blockId);
  res.innerHTML = `
    <div class="resolved-msg">
      <div class="resolved-msg-icon">✅</div>
      <div>
        <p>お役に立てて良かったです。</p>
        <small>またいつでもご利用ください。</small>
      </div>
    </div>`;
}

function onNotResolved(blockId) {
  const res = document.getElementById('res-' + blockId);
  // Disable buttons
  res.querySelectorAll('button').forEach(b => b.disabled = true);

  const followup = document.createElement('div');
  followup.className = 'followup-wrap';
  followup.style.marginTop = '12px';
  followup.innerHTML = `
    <p>別の症状や状況を入力してください</p>
    <div class="followup-input-row">
      <input class="followup-input" type="text" placeholder="さらに詳しく入力…" autocomplete="off"
        onkeydown="if(event.key==='Enter') doSearch(this.value)">
      <button class="followup-btn" onclick="doSearch(this.previousElementSibling.value)">検索</button>
    </div>`;

  document.getElementById(blockId).appendChild(followup);
  setTimeout(() => followup.querySelector('input').focus(), 100);
  setTimeout(() => followup.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
}

// URLパラメーター読み取り → demo=1 なら「映像が映らない」を自動検索
const params = new URLSearchParams(window.location.search);
if (params.get('demo') === '1') {
  const query = '映像が映らない';
  document.getElementById('mainInput').value = query;
  setTimeout(() => doSearch(query), 150);
}
